# ROS 2 ↔ Gazebo Harmonic bridge config for v1.
# Used by `ros_gz_bridge parameter_bridge --config-file`.
# Gazebo topic names assume model name "pos_robot" and world name "store".

# Sim clock: Gazebo → ROS
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# Velocity commands: ROS → Gazebo (driven by the DiffDrive plugin)
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/model/pos_robot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# Odometry: Gazebo → ROS
- ros_topic_name: "/odom"
  gz_topic_name: "/model/pos_robot/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# Joint states: Gazebo → ROS
- ros_topic_name: "/joint_states"
  gz_topic_name: "/world/store/model/pos_robot/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS
