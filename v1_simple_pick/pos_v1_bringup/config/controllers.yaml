# ros2_control controller_manager + controllers config.
# Loaded by gz_ros2_control plugin in pos_robot.urdf (see <gazebo> block).
#
# - joint_state_broadcaster: publishes /joint_states for the arm + gripper
#   joints (wheels are not in <ros2_control>, so they're absent from
#   /joint_states — the diff_drive plugin owns them).
# - arm_controller: joint_trajectory_controller with POSITION command
#   interface. gz_ros2_control writes the joint position directly each
#   step; no PID tuning required. JTC interpolates the trajectory at
#   100 Hz so motion looks smooth.
# - gripper_controller: joint_trajectory_controller with EFFORT command
#   interface and per-joint PID gains. The pick-and-place task commands
#   the fingers INSIDE the can (overshoot); the can blocks the joint,
#   the PID's saturated effort becomes the squeeze force that holds the
#   can by friction.

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - arm_shoulder_joint
      - arm_elbow_joint
      - arm_wrist_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: true
    open_loop_control: false
    # With position interface gz_ros2_control writes the position directly,
    # so the joint state always tracks the commanded trajectory perfectly.
    # We still want lax goal tolerances in case the URDF dynamics resist
    # for a tick.
    constraints:
      stopped_velocity_tolerance: 5.0
      goal_time: 0.0   # don't fail the goal on velocity tolerance

gripper_controller:
  ros__parameters:
    joints:
      - left_finger_joint
      - right_finger_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: true
    open_loop_control: false
    constraints:
      stopped_velocity_tolerance: 5.0
      goal_time: 0.0    # the fingers physically can't reach the
                        # commanded "overshoot" position while squeezing
                        # a can — that's intentional, never report failure
    gains:
      left_finger_joint:
        p: 400.0
        i: 5.0
        d: 5.0
        i_clamp: 5.0
        ff_velocity_scale: 0.0
      right_finger_joint:
        p: 400.0
        i: 5.0
        d: 5.0
        i_clamp: 5.0
        ff_velocity_scale: 0.0
