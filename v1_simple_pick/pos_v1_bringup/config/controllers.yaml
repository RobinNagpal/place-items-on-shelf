# ros2_control controller_manager + controllers config.
# Loaded by gz_ros2_control plugin in pos_robot.urdf (see <gazebo> block).
#
# - joint_state_broadcaster: publishes /joint_states for all hardware joints
#   (wheels state-only + arm/gripper). Replaces gz-sim-joint-state-publisher.
# - arm_controller: joint_trajectory_controller, POSITION command interface.
#   The URDF arm joints use the position hardware interface (kinematic), so
#   the gz_ros2_control plugin writes the commanded joint angle into Gazebo
#   each tick. No PID gains needed here — the arm tracks the trajectory
#   exactly without gravity sag. (Effort interface with hand-tuned PID was
#   tried first; gravity moment from the cantilevered arm + held can
#   exceeded the integrator's hold capacity at the carry pose and the
#   gripper settled several centimetres short of the IK target.)
# - gripper_controller: joint_trajectory_controller, EFFORT command interface.
#   Position interface would teleport the fingers through the can. Effort
#   lets the PID saturate against the unreachable position target so the
#   steady-state error becomes the squeeze force that grips the can by
#   friction. PID gains for the fingers are still tuned here.

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - arm_shoulder_joint
      - arm_elbow_joint
      - arm_wrist_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: true
    open_loop_control: false
    constraints:
      # With position interface the joint snaps to the commanded value
      # each tick, so "did the joint arrive" is trivially true. Loose
      # tolerances avoid spurious goal_time_tolerance warnings on the
      # action stream (the mission script ignores the action result
      # anyway — it publishes directly to /joint_trajectory).
      stopped_velocity_tolerance: 0.5
      goal_time: 5.0
    # NO `gains:` block — position interface has no PID to tune.

gripper_controller:
  ros__parameters:
    joints:
      - left_finger_joint
      - right_finger_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: true
    open_loop_control: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0   # don't fail the goal if the fingers can't close fully
                       # (i.e. when they're squeezing a can)
    gains:
      # Finger gains bumped from p=400/i_clamp=5 to p=700/i_clamp=12 so the
      # PID saturates harder against the can (the joint can't reach its
      # commanded overshoot, so the steady-state error -> squeeze force).
      # Without this the squeeze was too soft and the can slipped forward
      # out of the gripper during STAGE 7 drive-back, then fell to the floor.
      left_finger_joint:
        p: 700.0
        i: 12.0
        d: 8.0
        i_clamp: 12.0
        ff_velocity_scale: 0.0
      right_finger_joint:
        p: 700.0
        i: 12.0
        d: 8.0
        i_clamp: 12.0
        ff_velocity_scale: 0.0
