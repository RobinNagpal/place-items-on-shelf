# ros2_control controller_manager + controllers config.
# Loaded by gz_ros2_control plugin in pos_robot.urdf (see <gazebo> block).
#
# - joint_state_broadcaster: publishes /joint_states for all hardware joints
#   (wheels state-only + arm/gripper). Replaces gz-sim-joint-state-publisher.
# - arm_controller: joint_trajectory_controller with EFFORT command interface,
#   PID gains here compensate gravity. Accepts trajectory_msgs/JointTrajectory
#   on /arm_controller/joint_trajectory or a FollowJointTrajectory action.
# - gripper_controller: same controller type for the two finger joints. The
#   pick-and-place task commands a position INSIDE the can (overshoot) so the
#   PID's saturated effort becomes the squeeze force that holds the can by
#   friction.

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - arm_shoulder_joint
      - arm_elbow_joint
      - arm_wrist_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: true
    open_loop_control: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 1.0
    gains:
      arm_shoulder_joint:
        p: 250.0
        i: 20.0
        d: 25.0
        i_clamp: 8.0
        ff_velocity_scale: 0.0
      arm_elbow_joint:
        p: 180.0
        i: 12.0
        d: 18.0
        i_clamp: 6.0
        ff_velocity_scale: 0.0
      arm_wrist_joint:
        p: 100.0
        i: 5.0
        d: 10.0
        i_clamp: 4.0
        ff_velocity_scale: 0.0

gripper_controller:
  ros__parameters:
    joints:
      - left_finger_joint
      - right_finger_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: true
    open_loop_control: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0   # don't fail the goal if the fingers can't close fully
                       # (i.e. when they're squeezing a can)
    gains:
      # Finger gains bumped from p=400/i_clamp=5 to p=700/i_clamp=12 so the
      # PID saturates harder against the can (the joint can't reach its
      # commanded overshoot, so the steady-state error -> squeeze force).
      # Without this the squeeze was too soft and the can slipped forward
      # out of the gripper during STAGE 7 drive-back, then fell to the floor.
      left_finger_joint:
        p: 700.0
        i: 12.0
        d: 8.0
        i_clamp: 12.0
        ff_velocity_scale: 0.0
      right_finger_joint:
        p: 700.0
        i: 12.0
        d: 8.0
        i_clamp: 12.0
        ff_velocity_scale: 0.0
